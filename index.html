<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRAKTIR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --text-glow: rgba(212, 175, 55, 0.8);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            transition: opacity 0.8s ease-in-out;
            will-change: opacity;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* Полноэкранный режим: растягиваем без полей */
        #logo-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: fill; 
            object-position: center;
            transform: translateZ(0);
        }

        #splash-overlay {
            position: relative;
            z-index: 101;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 15vh; /* Отступ текста от низа */
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
        }

        /* Пульсирующая надпись-триггер */
        .interactive-text {
            color: var(--gold);
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-shadow: 0 0 15px var(--text-glow);
            cursor: pointer;
            animation: glowPulse 2s infinite ease-in-out;
            user-select: none;
            transition: transform 0.2s, opacity 0.4s;
        }

        @keyframes glowPulse {
            0% { opacity: 0.6; text-shadow: 0 0 10px var(--text-glow); }
            50% { opacity: 1; text-shadow: 0 0 30px #ffd700, 0 0 10px #fff; }
            100% { opacity: 0.6; text-shadow: 0 0 10px var(--text-glow); }
        }

        /* Экран регистрации */
        #reg-screen { 
            display: none; 
            padding: 50px 25px; 
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
            height: 100vh; 
            text-align: center;
            box-sizing: border-box;
        }

        h2 { color: var(--gold); letter-spacing: 4px; margin-bottom: 40px; text-transform: uppercase; }

        input {
            width: 100%; padding: 18px; margin: 15px 0;
            background: #111; border: 1px solid #333;
            color: #fff; border-radius: 12px; box-sizing: border-box;
            font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        .btn-entry {
            width: 100%; padding: 20px;
            background: linear-gradient(180deg, #ffd700, #b8860b);
            color: #000; border: none; border-radius: 12px;
            font-weight: bold; text-transform: uppercase;
            margin-top: 30px; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <video id="vid" playsinline webkit-playsinline muted poster="Poster1.png">
            <source src="Poster3.mp4" type="video/mp4">
        </video>
        
        <div id="splash-overlay">
            <div class="interactive-text" id="trigger" onclick="launchApp()">WARSPEAR ONLINE</div>
        </div>
    </div>

    <div id="reg-screen">
        <h2>Вход в Трактир</h2>
        <input type="text" id="nick" placeholder="Игровой Никнейм">
        <input type="tel" id="phone" placeholder="Номер телефона">
        <button class="btn-entry" onclick="sendReg()">Начать Торговлю</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#000000";

        let active = false;
        function launchApp() {
            if (active) return;
            const v = document.getElementById('vid');
            const txt = document.getElementById('trigger');
            
            v.muted = false; // Включаем звук монет
            v.play().then(() => {
                active = true;
                txt.style.opacity = '0';
                txt.style.transform = 'scale(0.8)';

                // Таймер на 7 секунд (длина твоего видео)
                setTimeout(() => {
                    const splash = document.getElementById('splash-screen');
                    splash.style.opacity = '0';
                    
                    setTimeout(() => {
                        // Чистим память
                        v.pause(); v.src = ""; v.load();
                        splash.style.display = 'none';
                        document.getElementById('reg-screen').style.display = 'block';
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    }, 800);
                }, 7000); 
            }).catch(err => {
                v.muted = true;
                v.play();
                active = true;
            });
        }

        function sendReg() {
            let n = document.getElementById('nick').value;
            if(!n) return tg.showAlert("Назови свое имя, Странник!");
            tg.sendData(JSON.stringify({
                type: "registration", 
                nick: n, 
                phone: document.getElementById('phone').value
            }));
        }
    </script>
</body>
</html>
