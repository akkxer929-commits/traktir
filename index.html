<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRAKTIR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #d4af37;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            overflow: hidden;
            width: 100%; height: 100vh;
            -webkit-tap-highlight-color: transparent;
            display: flex; align-items: center; justify-content: center;
        }

        /* ЭКРАН ЗАГРУЗКИ */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            background: #000;
            transition: opacity 0.8s ease-in-out;
            will-change: opacity;
        }

        /* ГИФКА: Растягиваем на весь экран (эффект "близко") */
        #gif-loader {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Заполняет всё пространство без полей */
            object-position: center;
            display: block;
        }

        /* НЕВИДИМЫЙ ТРИГГЕР НА ВЕСЬ ЭКРАН */
        #tap-zone {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 101;
            cursor: pointer;
        }

        /* ЭКРАН РЕГИСТРАЦИИ */
        #reg-screen {
            display: none;
            padding: 50px 25px;
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
            height: 100vh;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            position: fixed;
            top: 0; left: 0;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            z-index: 50;
        }

        h2 { color: var(--gold); letter-spacing: 4px; margin-bottom: 40px; text-transform: uppercase; font-size: 24px; }

        input {
            width: 100%; padding: 18px; margin: 15px 0;
            background: #111; border: 1px solid #333;
            color: #fff; border-radius: 12px; box-sizing: border-box;
            font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        .btn-entry {
            width: 100%; padding: 20px;
            background: linear-gradient(180deg, #ffd700, #b8860b);
            color: #000; border: none; border-radius: 12px;
            font-weight: bold; text-transform: uppercase;
            margin-top: 30px; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img id="gif-loader" src="Poster2.gif" alt="Traktir Loading...">
        
        <div id="tap-zone" onclick="launchApp()"></div>
    </div>

    <div id="reg-screen">
        <h2>Вход в Трактир</h2>
        <input type="text" id="nick" placeholder="Игровой Никнейм в Warspear">
        <input type="tel" id="phone" placeholder="Ваш телефон (опционально)">
        <button class="btn-entry" onclick="sendReg()">Начать Торговлю</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#000000";

        let active = false;
        function launchApp() {
            if (active) return;
            active = true;

            // С гифкой нам не нужно ждать play(), просто запускаем таймер
            // Ровно через 7 секунд (длина анимации с монетами) переходим дальше
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                
                setTimeout(() => {
                    splash.style.display = 'none';
                    document.getElementById('reg-screen').style.display = 'block';
                    
                    // Виброотклик для ощущения "входа"
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                }, 800);
            }, 7000); 
        }

        function sendReg() {
            let n = document.getElementById('nick').value;
            if(!n) return tg.showAlert("Назови свое имя, Странник!");
            
            tg.sendData(JSON.stringify({
                type: "registration", 
                nick: n, 
                phone: document.getElementById('phone').value
            }));
        }
    </script>
</body>
</html>
