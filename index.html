<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRAKTIR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #d4af37;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
            /* Обеспечивает центрирование на любом экране */
            display: flex; align-items: center; justify-content: center;
        }

        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            background: #000;
            transition: opacity 0.8s ease;
            will-change: opacity;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- МАГИЯ БЛИЗОСТИ И ЕДИНОГО ЭКРАНА --- */
        video {
            width: 100%;
            height: 100%;
            /* object-fit: cover РАСТЯГИВАЕТ ИЗОБРАЖЕНИЕ НА ВЕСЬ ЭКРАН */
            /* Это убирает черные поля и делает щит максимально "близким" */
            object-fit: cover; 
            object-position: center;
            transform: translateZ(0); /* Ускорение видеокарты */
            backface-visibility: hidden;
        }

        /* --- ЧИСТЫЙ НЕВИДИМЫЙ ТРИГГЕР НА ВЕСЬ ЭКРАН --- */
        #splash-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 101;
            cursor: pointer;
            background: transparent; /* Полностью невидимый блок */
        }

        /* Блок, который ловит клик именно по щиту (приблизительно) */
        #invisible-trigger {
            width: 80%; /* Площадь триггера */
            height: 60vh; /* Высота триггера */
            background: transparent; /* Невидимый */
            cursor: pointer;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%); /* Идеальное центрирование */
            user-select: none;
        }

        /* --- ЭКРАН РЕГИСТРАЦИИ (БЕЗ ИЗМЕНЕНИЙ) --- */
        #reg-screen { 
            display: none; 
            padding: 50px 25px; 
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
            height: 100vh; 
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            z-index: 50;
            position: fixed;
            top: 0; left: 0;
            color: #fff;
            font-family: sans-serif;
        }

        h2 { color: var(--gold); letter-spacing: 4px; margin-bottom: 40px; text-transform: uppercase; }

        input {
            width: 100%; padding: 18px; margin: 15px 0;
            background: #111; border: 1px solid #333;
            color: #fff; border-radius: 12px; box-sizing: border-box;
            font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        .btn-entry {
            width: 100%; padding: 20px;
            background: linear-gradient(180deg, #ffd700, #b8860b);
            color: #000; border: none; border-radius: 12px;
            font-weight: bold; text-transform: uppercase;
            margin-top: 30px; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <video id="vid" playsinline webkit-playsinline muted poster="Poster1.png">
            <source src="Poster3.mp4" type="video/mp4">
        </video>
        
        <div id="splash-overlay">
            <div id="invisible-trigger" onclick="runApp()"></div>
        </div>
    </div>

    <div id="reg-screen">
        <h2>Регистрация</h2>
        <input type="text" id="nick" placeholder="Игровой Никнейм в Warspear">
        <input type="tel" id="phone" placeholder="Ваш телефон">
        <button class="btn-entry" onclick="save()">Войти в Трактир</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#000000";

        let active = false;
        function runApp() {
            if (active) return;
            const v = document.getElementById('vid');
            
            // Включаем звук монет при нажатии
            v.muted = false; 
            v.play().then(() => {
                active = true;
                // Не показываем никаких надписей "ЗАГРУЗКА..."

                // Таймер на 7 секунд (длина твоего видео Poster3.mp4)
                setTimeout(() => {
                    const splash = document.getElementById('splash-screen');
                    splash.style.opacity = '0'; // Плавное затухание
                    
                    setTimeout(() => {
                        // Очистка ресурсов
                        v.pause(); v.src = ""; v.load();
                        splash.style.display = 'none';
                        document.getElementById('reg-screen').style.display = 'block';
                        // Виброотклик при входе
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    }, 800); // Время на анимацию исчезновения
                }, 7000); 

            }).catch(err => {
                // Если звук заблокирован, запускаем без него
                v.muted = true;
                v.play();
                active = true;
            });
        }

        function save() {
            let n = document.getElementById('nick').value;
            if(!n) return tg.showAlert("Странник, назови свое имя!");
            // Отправляем данные боту
            tg.sendData(JSON.stringify({
                type: "registration", 
                nick: n, 
                phone: document.getElementById('phone').value
            }));
        }
    </script>
</body>
</html>
