<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRAKTIR - Era of Gold</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --bg: #000;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ПОЛНОЭКРАННЫЙ SPLASH --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            cursor: pointer;
            transition: opacity 0.8s ease, transform 0.8s ease;
            background: #000;
        }

        /* Видео на весь экран */
        #logo-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; /* Растягивает видео без рамок */
            object-position: center;
        }

        /* Оверлей для текста и полоски */
        #splash-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.9) 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            padding-bottom: 60px;
            box-sizing: border-box;
        }

        .tap-hint {
            color: var(--gold);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px var(--gold);
            animation: pulse 2s infinite;
            margin-bottom: 25px;
        }

        #loading-bar-container {
            width: 70%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: none;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        #loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--gold), #fff);
            box-shadow: 0 0 15px var(--gold);
        }

        /* --- ЭКРАН РЕГИСТРАЦИИ --- */
        #reg-screen {
            display: none;
            padding: 40px 25px;
            height: 100vh;
            background: linear-gradient(180deg, #121212 0%, #000 100%);
            box-sizing: border-box;
            text-align: center;
        }

        h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: var(--gold); font-size: 10px; margin-bottom: 8px; letter-spacing: 1px; }

        input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: var(--gold); }

        .btn-gold {
            background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%);
            color: #000;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            margin-top: 30px;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.4; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="splash-screen" onclick="startLoading()">
        <video id="logo-video" playsinline webkit-playsinline muted poster="Poster1.png">
            <source src="Poster2.mp4" type="video/mp4">
        </video>
        
        <div id="splash-overlay">
            <div class="tap-hint" id="hint-text">Тапни для входа</div>
            <div id="loading-bar-container">
                <div id="loading-bar"></div>
            </div>
        </div>
    </div>

    <div id="reg-screen">
        <h2>Регистрация</h2>
        
        <div class="form-group">
            <label>НИКНЕЙМ В WARSPEAR</label>
            <input type="text" id="game-nick" placeholder="Напр: ShamanKhabar">
        </div>

        <div class="form-group">
            <label>ТЕЛЕФОН ДЛЯ СВЯЗИ</label>
            <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
        </div>

        <button class="btn-gold" onclick="finishReg()">Войти в Трактир</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#000000";

        let isStarted = false;
        function startLoading() {
            if (isStarted) return;
            const video = document.getElementById('logo-video');
            
            // Активируем звук и полноэкранное видео
            video.muted = false;
            video.play().then(() => {
                isStarted = true;
                document.getElementById('hint-text').innerText = "Загрузка...";
                document.getElementById('loading-bar-container').style.display = 'block';
                
                let width = 0;
                let interval = setInterval(() => {
                    width += 1.43; // Расчет на ~7 секунд видео
                    if (width >= 100) {
                        width = 100;
                        clearInterval(interval);
                        showApp();
                    }
                    document.getElementById('loading-bar').style.width = width + '%';
                }, 100);
            }).catch(err => {
                // Если звук блокирован, запускаем без него
                video.muted = true;
                video.play();
                isStarted = true;
            });
        }

        function showApp() {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            splash.style.transform = 'scale(1.1)';
            setTimeout(() => {
                splash.style.display = 'none';
                document.getElementById('reg-screen').style.display = 'block';
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }, 800);
        }

        function finishReg() {
            let nick = document.getElementById('game-nick').value;
            if (!nick) {
                tg.showAlert("Странник, назови свой ник!");
                return;
            }
            tg.sendData(JSON.stringify({
                type: "reg",
                nickname: nick,
                phone: document.getElementById('phone').value
            }));
        }
    </script>
</body>
</html>
