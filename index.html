<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRAKTIR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            background: #000;
            transition: opacity 0.8s ease;
            display: flex; align-items: center; justify-content: center;
        }

        /* ЦЕНТРИРОВАНИЕ БЕЗ ИСКАЖЕНИЙ */
        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Показывает картинку целиком, без зума */
            transform: translateZ(0);
        }

        /* НЕВИДИМАЯ КНОПКА НА ВЕСЬ ЭКРАН */
        #tap-zone {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 101;
            cursor: pointer;
            background: transparent;
        }

        /* ЭКРАН РЕГИСТРАЦИИ */
        #reg-screen {
            display: none;
            padding: 40px 25px;
            background: #0a0a0a;
            height: 100vh;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            color: #fff;
            font-family: sans-serif;
        }

        h2 { color: #d4af37; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }
        input {
            width: 100%; padding: 18px; margin: 12px 0;
            background: #151515; border: 1px solid #333;
            color: #fff; border-radius: 12px; box-sizing: border-box; font-size: 16px;
        }
        .btn {
            width: 100%; padding: 18px;
            background: linear-gradient(180deg, #ffd700, #b8860b);
            color: #000; border: none; border-radius: 12px;
            font-weight: bold; text-transform: uppercase; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <video id="vid" playsinline webkit-playsinline muted poster="Poster1.png">
            <source src="Poster3.mp4" type="video/mp4">
        </video>
        <div id="tap-zone" onclick="runApp()"></div>
    </div>

    <div id="reg-screen">
        <h2>Регистрация</h2>
        <input type="text" id="nick" placeholder="Ник в Warspear">
        <input type="tel" id="phone" placeholder="Ваш телефон">
        <button class="btn" onclick="save()">Войти</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#000000";

        let started = false;
        function runApp() {
            if (started) return;
            const v = document.getElementById('vid');
            
            v.muted = false; // Включаем звук монет при тапе
            v.play().then(() => {
                started = true;
                
                // Ждем 7 секунд (длина твоего видео)
                setTimeout(() => {
                    const splash = document.getElementById('splash-screen');
                    splash.style.opacity = '0';
                    
                    setTimeout(() => {
                        v.pause(); v.src = ""; v.load();
                        splash.style.display = 'none';
                        document.getElementById('reg-screen').style.display = 'block';
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    }, 800);
                }, 7000);
            }).catch(() => {
                v.muted = true;
                v.play();
                started = true;
            });
        }

        function save() {
            let n = document.getElementById('nick').value;
            if(!n) return tg.showAlert("Странник, введи ник!");
            tg.sendData(JSON.stringify({type: "reg", nick: n, phone: document.getElementById('phone').value}));
        }
    </script>
</body>
</html>
