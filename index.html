<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAKTIR Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Общие настройки "Трактира" */
        body { 
            background-color: #0f0f12; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; 
            overflow-x: hidden;
        }
        
        header {
            background: linear-gradient(180deg, #1e1e24 0%, #0f0f12 100%);
            padding: 20px; text-align: left;
            border-bottom: 2px solid #ffd700;
        }

        h1 { color: #ffd700; margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .user-box { display: flex; align-items: center; margin-top: 10px; }
        .avatar { width: 40px; height: 40px; background: #ffd700; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }

        /* Сетка товаров */
        .container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 20px; 
        }

        .card { 
            background: #1e1e24; 
            border-radius: 12px; 
            padding: 15px; 
            text-align: center; 
            border: 1px solid #333;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:active { transform: scale(0.95); border-color: #ffd700; }

        .card h3 { font-size: 16px; margin: 10px 0 5px; color: #fff; }
        .card p { font-size: 12px; color: #888; margin: 0 0 10px; }
        .price { color: #4caf50; font-weight: bold; font-size: 18px; display: block; margin-bottom: 10px; }

        .btn { 
            background: #ffd700; color: #000; 
            padding: 8px; border: none; 
            border-radius: 6px; font-weight: bold; 
            width: 100%; cursor: pointer;
            font-size: 13px;
        }

        /* Футер */
        .footer { padding: 20px; text-align: center; font-size: 11px; color: #555; }
    </style>
</head>
<body>

    <header>
        <h1>TRAKTIR MARKET</h1>
        <div class="user-box">
            <div class="avatar" id="avatar-init">?</div>
            <div>
                <div style="font-size: 14px;">Приветствуем,</div>
                <div id="user-name" style="color: #ffd700; font-weight: bold;">Странник</div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h3>100к Голд</h3>
            <p>Warspear (Amber)</p>
            <span class="price">500 ₽</span>
            <button class="btn" onclick="buy('100 000 Gold', '500 ₽')">КУПИТЬ</button>
        </div>

        <div class="card">
            <h3>500к Голд</h3>
            <p>Warspear (Amber)</p>
            <span class="price">2400 ₽</span>
            <button class="btn" onclick="buy('500 000 Gold', '2400 ₽')">КУПИТЬ</button>
        </div>

        <div class="card">
            <h3>1кк Голд</h3>
            <p>Warspear (Amber)</p>
            <span class="price">4700 ₽</span>
            <button class="btn" onclick="buy('1 000 000 Gold', '4700 ₽')">КУПИТЬ</button>
        </div>

        <div class="card">
            <h3>Гарант</h3>
            <p>Услуга сделки</p>
            <span class="price">100 ₽</span>
            <button class="btn" onclick="buy('Garant Service', '100 ₽')">ВЫЗВАТЬ</button>
        </div>
    </div>

    <div class="footer">
        Powered by Cyb-Montazhnik Tech &copy; 2026
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#1e1e24"; // Красим верхнюю полоску Telegram в цвет нашего приложения

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            document.getElementById('user-name').innerText = user.first_name;
            // Берем первую букву имени для аватарки
            document.getElementById('avatar-init').innerText = user.first_name.charAt(0).toUpperCase();
        }

        function buy(item, price) {
            let orderData = {
                item: item,
                price: price,
                game: "Warspear Online"
            };
            tg.sendData(JSON.stringify(orderData));
        }
    </script>
</body>
</html>
